# ============================================================================
#  PASO 1 — Contenedores locales: PostgreSQL (transaccional) + MongoDB (catálogo)
#  Las variables ${...} se leen automáticamente del archivo .env de este directorio.
# ============================================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce} -d ${POSTGRES_DB:-ecommerce_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: ecommerce_mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    # IMPORTANTE: el conector MongoDB de Prisma EXIGE un replica set (usa
    # transacciones internamente). Levantamos un replica set de un solo nodo.
    command: ["--replSet", "rs0", "--bind_ip_all"]
    # El healthcheck inicializa el replica set la primera vez y lo verifica después.
    healthcheck:
      test: >-
        mongosh --quiet --eval "try { rs.status().ok } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok }"
      interval: 10s
      start_period: 20s
      timeout: 10s
      retries: 12

volumes:
  postgres_data:
  mongo_data:
